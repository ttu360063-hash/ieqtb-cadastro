<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <title>IEQTB | Painel Administrativo</title>
    <meta name="description" content="Painel secreto para visualizar os cadastros do evento IEQTB." />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#040711" />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      /* ============================================
         Auth Screen - Modern Centered with Glassmorphism
         ============================================ */
      .auth-outer {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        position: relative;
        z-index: 10;
      }

      .auth-box {
        width: 100%;
        max-width: 400px;
        padding: clamp(28px, 6vw, 44px);
        border-radius: 24px;
        background: linear-gradient(145deg, rgba(16, 22, 42, 0.85), rgba(7, 12, 25, 0.92));
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .auth-box h1 {
        margin: 0;
        font-size: clamp(1.4rem, 4vw, 1.8rem);
        text-align: center;
        background: linear-gradient(135deg, #c7d2fe 0%, #a5b4fc 50%, #818cf8 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .auth-box .auth-hint {
        text-align: center;
        color: rgba(203, 213, 225, 0.7);
        font-size: 0.95rem;
        margin-top: -16px;
      }

      .auth-alert {
        padding: 12px 16px;
        border-radius: 12px;
        background: rgba(251, 113, 133, 0.12);
        border: 1px solid rgba(251, 113, 133, 0.3);
        color: #fda4af;
        font-size: 0.9rem;
        text-align: center;
        display: none;
      }

      .auth-alert.show {
        display: block;
      }

      .auth-field {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .auth-field label {
        font-size: 0.88rem;
        font-weight: 600;
        color: rgba(203, 213, 225, 0.8);
        letter-spacing: 0.02em;
      }

      .auth-field input {
        width: 100%;
        min-height: 54px;
        padding: 0 18px;
        border-radius: 14px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        background: rgba(6, 11, 24, 0.8);
        color: var(--text);
        font-size: 1rem;
        outline: none;
        transition: 160ms ease;
        letter-spacing: 0.05em;
        text-align: center;
      }

      .auth-field input::placeholder {
        color: rgba(148, 163, 184, 0.4);
        letter-spacing: normal;
      }

      .auth-field input:focus {
        border-color: rgba(129, 140, 248, 0.5);
        box-shadow: 0 0 0 4px rgba(129, 140, 248, 0.15);
      }

      .auth-field input.fail {
        border-color: rgba(251, 113, 133, 0.5);
      }

      .auth-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        min-height: 52px;
        padding: 0 20px;
        border-radius: 14px;
        border: none;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: 180ms ease;
        color: #fff;
        background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        box-shadow: 0 8px 24px rgba(99, 102, 241, 0.35);
      }

      .auth-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 32px rgba(99, 102, 241, 0.45);
      }

      .auth-btn:active {
        transform: translateY(0);
      }

      /* ============================================
         Admin Panel
         ============================================ */
      .admin-view {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        position: relative;
        z-index: 10;
      }

      .admin-bar {
        max-width: 1100px;
        width: 100%;
        margin: 0 auto;
        padding: 20px clamp(16px, 4vw, 32px);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }

      .admin-logo {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
      }

      .admin-logo-name {
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--text);
      }

      .admin-body {
        max-width: 1100px;
        width: 100%;
        margin: 0 auto;
        padding: 0 clamp(16px, 4vw, 32px) 40px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .admin-title {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 24px;
        border-radius: 20px;
        background: linear-gradient(145deg, rgba(16, 22, 42, 0.7), rgba(7, 12, 25, 0.85));
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .admin-title h1 {
        margin: 0;
        font-size: clamp(1.5rem, 4vw, 2rem);
        background: linear-gradient(135deg, #c7d2fe 0%, #a5b4fc 50%, #818cf8 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .admin-title p {
        margin: 0;
        color: rgba(203, 213, 225, 0.7);
        font-size: 1rem;
      }

      /* Stats Row */
      .stats-row {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
      }

      .stat-box {
        padding: 16px 24px;
        border-radius: 16px;
        background: linear-gradient(145deg, rgba(16, 22, 42, 0.7), rgba(7, 12, 25, 0.85));
        border: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        align-items: center;
        gap: 16px;
        flex: 1;
        min-width: 200px;
      }

      .stat-box .stat-emoji {
        font-size: 1.8rem;
      }

      .stat-box .stat-info {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .stat-box .stat-num {
        font-size: 1.6rem;
        font-weight: 700;
        color: var(--text);
        line-height: 1;
      }

      .stat-box .stat-label {
        font-size: 0.85rem;
        color: rgba(203, 213, 225, 0.6);
      }

      /* Actions Bar */
      .acts-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .act-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 18px;
        border-radius: 12px;
        font-weight: 600;
        font-size: 0.9rem;
        cursor: pointer;
        border: none;
        transition: 160ms ease;
        text-decoration: none;
      }

      .act-btn.main {
        color: #fff;
        background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
      }

      .act-btn.main:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
      }

      .act-btn.warn {
        color: #fda4af;
        background: rgba(251, 113, 133, 0.12);
        border: 1px solid rgba(251, 113, 133, 0.25);
      }

      .act-btn.warn:hover {
        background: rgba(251, 113, 133, 0.2);
      }

      .act-btn.outline {
        color: rgba(203, 213, 225, 0.8);
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(148, 163, 184, 0.15);
      }

      .act-btn.outline:hover {
        background: rgba(255, 255, 255, 0.08);
      }

      /* Registrations Grid - Cards Layout */
      .reg-section {
        border-radius: 20px;
        background: linear-gradient(145deg, rgba(16, 22, 42, 0.7), rgba(7, 12, 25, 0.85));
        border: 1px solid rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }

      .reg-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 16px;
        padding: 20px;
      }

      .reg-card {
        padding: 20px;
        border-radius: 16px;
        background: rgba(4, 9, 22, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.06);
        display: flex;
        flex-direction: column;
        gap: 12px;
        transition: 180ms ease;
      }

      .reg-card:hover {
        border-color: rgba(129, 140, 248, 0.2);
        transform: translateY(-2px);
      }

      .reg-card-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }

      .reg-card-name {
        font-size: 1.05rem;
        font-weight: 700;
        color: var(--text);
        line-height: 1.3;
      }

      .reg-card-remove {
        padding: 6px 10px;
        border-radius: 8px;
        font-size: 0.8rem;
        cursor: pointer;
        border: none;
        color: #fda4af;
        background: rgba(251, 113, 133, 0.1);
        transition: 160ms ease;
        flex-shrink: 0;
      }

      .reg-card-remove:hover {
        background: rgba(251, 113, 133, 0.2);
      }

      .reg-detail {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .reg-detail-label {
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: rgba(203, 213, 225, 0.5);
      }

      .reg-detail-value {
        font-size: 0.95rem;
        color: rgba(226, 232, 240, 0.9);
      }

      /* Empty State */
      .empty-state {
        padding: 60px 20px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      .empty-state-icon {
        font-size: 3rem;
        opacity: 0.5;
      }

      .empty-state-title {
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--text);
      }

      .empty-state-text {
        color: rgba(203, 213, 225, 0.6);
        font-size: 0.95rem;
      }

      /* Responsive */
      @media (max-width: 640px) {
        .stats-row {
          flex-direction: column;
        }

        .stat-box {
          min-width: unset;
        }

        .acts-row {
          flex-direction: column;
        }

        .act-btn {
          width: 100%;
          justify-content: center;
        }

        .reg-grid {
          grid-template-columns: 1fr;
        }

        .admin-bar {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <!-- ============================================
         Auth Screen
         ============================================ -->
    <div id="authScreen" class="auth-outer">
      <div class="auth-box">
        <h1>Acesso Administrativo</h1>
        <p class="auth-hint">Digite a senha para acessar o painel.</p>

        <div id="authError" class="auth-alert">
          Senha incorreta
        </div>

        <div class="auth-field">
          <label for="passwordInput">Digite a senha</label>
          <input
            id="passwordInput"
            type="password"
            placeholder="********"
            autocomplete="off"
          />
        </div>

        <button type="button" id="loginBtn" class="auth-btn">
          Entrar
        </button>
      </div>
    </div>

    <!-- ============================================
         Admin Panel (shown after login)
         ============================================ -->
    <div id="adminPanel" class="admin-view" style="display: none;">
      <header class="admin-bar">
        <a class="admin-logo" href="./index.html">
          <span class="admin-logo-name">IEQTB</span>
        </a>
        <button type="button" id="logoutBtn" class="act-btn outline">
          Sair
        </button>
      </header>

      <main class="admin-body">
        <section class="admin-title">
          <h1>Painel Administrativo</h1>
          <p>Lista de participantes cadastrados</p>
        </section>

        <div class="stats-row">
          <div class="stat-box">
            <span class="stat-emoji">&#128100;</span>
            <div class="stat-info">
              <span id="totalCount" class="stat-num">0</span>
              <span class="stat-label">Total de cadastros</span>
            </div>
          </div>
        </div>

        <div class="acts-row">
          <button type="button" id="exportBtn" class="act-btn main">
            Exportar CSV
          </button>
          <button type="button" id="clearAllBtn" class="act-btn warn">
            Limpar todos os dados
          </button>
        </div>

        <section class="reg-section">
          <div id="registrationsList" class="reg-grid">
            <div class="empty-state">
              <span class="empty-state-icon">&#128203;</span>
              <span class="empty-state-title">Nenhum cadastro encontrado</span>
              <span class="empty-state-text">Os participantes aparecerao aqui apos se cadastrarem.</span>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
