<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Congresso de Jovens</title>
  <link rel="stylesheet" href="styles.css"/>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<main class="container">

  <section class="hero">
    <img src="./LOGOMARCA.png" class="logo"/>

    <h1>
      Congresso de <span>Jovens</span>
    </h1>

    <p class="subtitle">
      Fortalecendo nossa fé e propósito
    </p>

    <div class="info">
      <div>📅 13 de Junho de 2026</div>
      <div>📍 IEQ TOBIAS</div>
    </div>
  </section>

  <section class="form-box">

    <h2>Faça sua <span>inscrição</span></h2>
    <p>Preencha os dados abaixo para confirmar sua participação.</p>

    <form id="form">

      <div class="input">
        <span>👤</span>
        <input type="text" placeholder="Digite seu nome completo" required>
      </div>

      <div class="input">
        <span>🎂</span>
        <input type="number" placeholder="Digite sua idade" required>
      </div>

      <div class="input">
        <span>✉</span>
        <input type="email" placeholder="Digite seu e-mail" required>
      </div>

      <div class="input">
        <span>⛪</span>
        <input type="text" placeholder="Digite o nome da sua igreja" required>
      </div>

      <div class="input">
        <span>📞</span>
        <input type="tel" placeholder="Digite seu telefone" required>
      </div>

      <button type="submit">Finalizar inscrição →</button>

    </form>

    <div class="success" id="success">
      <h3>✔</h3>
      <strong>Sua inscrição foi concluída, esperamos por você!</strong>
      <p>Haverá atualizações e lembretes enviados por e-mail.</p>
    </div>

  </section>

</main>

<script>
const form = document.getElementById("form");
const success = document.getElementById("success");

form.addEventListener("submit", e => {
  e.preventDefault();
  form.style.display = "none";
  success.style.display = "block";
});
</script>

</body>
</html>
